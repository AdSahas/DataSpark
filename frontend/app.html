<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DataSpark | Dashboard</title>
    <style>
      :root {
        --bg: #020617;
        --card-bg: #0f172a;
        --border: #1e293b;
        --accent: #38bdf8;
        --text-main: #f1f5f9;
        --text-muted: #94a3b8;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 32px;
        background: rgba(15, 23, 42, 0.5);
        border-bottom: 1px solid var(--border);
        backdrop-filter: blur(12px);
      }
      .logo { font-size: 1.25rem; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
      .nav-links { display: flex; gap: 24px; }
      .nav-link { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: 0.2s; }
      .nav-link:hover { color: var(--accent); }
      .nav-active { color: var(--accent); font-weight: 600; text-decoration: none; }
      #upload-bar {
        padding: 16px 32px;
        background: var(--card-bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
      }
      #upload-bar label {
        cursor: pointer;
        background: #1e293b;
        color: var(--accent);
        border: 1px solid var(--accent);
        padding: 6px 16px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        transition: 0.2s;
      }
      #upload-bar label:hover { background: var(--accent); color: var(--bg); }
      #upload-status { font-size: 0.85rem; color: var(--text-muted); }
      #panels {
        display: flex;
        flex: 1;
        overflow: hidden;
        padding: 24px;
        gap: 20px;
      }
      .panel {
        flex: 1;
        overflow-y: auto;
        background: var(--card-bg);
        border-radius: 10px;
        border: 1px solid var(--border);
        padding: 24px;
      }
      .panel h3 {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-muted);
        margin-bottom: 20px;
      }
      #input-bar {
        padding: 24px 32px;
        background: var(--card-bg);
        border-top: 1px solid var(--border);
        display: flex;
        gap: 12px;
      }
      #input-bar textarea {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: white;
        padding: 12px;
        font-size: 0.95rem;
        resize: none;
        height: 50px;
        outline: none;
        transition: border-color 0.2s;
      }
      #input-bar textarea:focus { border-color: var(--accent); }
      #input-bar button {
        background: var(--accent);
        color: var(--bg);
        border: none;
        border-radius: 8px;
        padding: 0 24px;
        cursor: pointer;
        font-weight: 700;
        transition: filter 0.2s;
      }
      #input-bar button:hover { filter: brightness(1.1); }
      .tool-card {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 14px;
        margin-bottom: 10px;
      }
      .tool-name { color: var(--accent); font-size: 0.8rem; font-weight: 700; margin-bottom: 6px; }
      .result-card {
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 14px;
      }
      .section-label {
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--accent);
        font-weight: 800;
        margin-bottom: 12px;
      }
      .thinking-card {
        background: #red;
        border-left: 3px solid #475569;
        color: #94a3b8;
        padding: 14px;
        border-radius: 6px;
        margin-bottom: 14px;
        font-size: 0.8rem;
        font-style: italic;
        line-height: 1.5;
      }
      .summary-banner {
        background: #0c4a6e;
        border-left: 3px solid #7dd3fc;
        color: #f0f9ff;
        padding: 14px;
        border-radius: 6px;
        margin-bottom: 14px;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .insight-card {
        background: #064e3b;
        border: 1px solid #059669;
        color: #d1fae5;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 14px;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .error-card {
        background: #7f1d1d;
        border: 1px solid #dc2626;
        color: #fecaca;
        padding: 16px;
        border-radius: 8px;
        margin-bottom: 14px;
        font-size: 0.9rem;
        line-height: 1.5;
      }
      .stat-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
      .stat-table td {
        padding: 10px 4px;
        border-bottom: 1px solid #2d3f55;
        font-size: 0.85rem;
        overflow-wrap: break-word;
      }
      .col-name { font-weight: 600; color: var(--text-main); width: 40%; vertical-align: top; }
      .col-value { text-align: left; color: var(--text-muted); font-family: monospace; word-break: break-word; }
    </style>
  </head>
  <body>
    <nav>
      <div class="logo">⚡ DataSpark <b style="color:yellow; font-size:small;"> BETA </b></div>
      <div class="nav-links">
        <a href="/app" class="nav-active">Dashboard</a>
      </div>
    </nav>

    <div id="upload-bar">
      <label for="csv-input">Upload CSV</label>
      <input type="file" id="csv-input" accept=".csv" style="display:none" />
      <span id="upload-status">No file uploaded</span>
    </div>

    <div id="panels">
      <div class="panel" id="tool-panel">
        <h3>Operations</h3>
        <div id="tool-list"></div>
      </div>
      <div class="panel" id="result-panel">
        <h3>Analysis Results</h3>
        <div id="result-list"></div>
      </div>
    </div>

    <div id="input-bar">
      <textarea id="user-input" placeholder="Query your data..." onkeydown="handleKey(event)"></textarea>
      <button onclick="sendMessage()">Analyze</button>
    </div>

    <script>
      var API = "http://127.0.0.1:8000";

      document.getElementById("csv-input").addEventListener("change", async function(e) {
        var file = e.target.files[0];
        if (!file) return;
        var form = new FormData();
        form.append("file", file);
        document.getElementById("upload-status").textContent = "Processing...";
        try {
          var res = await fetch(API + "/upload", { method: "POST", body: form });
          var data = await res.json();
          document.getElementById("upload-status").textContent = res.ok ? "✓ " + data.filename : "✗ Error";
        } catch (err) {
          document.getElementById("upload-status").textContent = "✗ Connection Failed";
        }
      });

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
      }

      async function sendMessage() {
        var input = document.getElementById("user-input");
        var message = input.value.trim();
        if (!message) return;
        input.value = "";

        document.getElementById("tool-list").innerHTML = "<p style='color:#64748b;font-size:0.85rem;'>Agent thinking...</p>";
        document.getElementById("result-list").innerHTML = "<p style='color:#64748b;font-size:0.85rem;'>Analyzing data...</p>";

        try {
          var res = await fetch(API + "/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: message })
          });
          var data = await res.json();
          renderTools(data.tool_calls || []);
          renderResult(data);
        } catch (err) {
          document.getElementById("result-list").innerHTML = tag("div", "error-card", "Error: " + esc(err.message));
        }
      }

      // ── Helpers ──────────────────────────────────────────────────────────────

      function tag(el, cls, inner) {
        return "<" + el + " class='" + cls + "'>" + inner + "</" + el + ">";
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function formatValue(value) {
        if (value === null || value === undefined) return "<span style='color:#64748b'>null</span>";
        if (typeof value === "boolean") return value ? "true" : "false";
        if (typeof value === "number") return Number.isInteger(value) ? String(value) : value.toFixed(4);
        if (typeof value === "string") return esc(value);
        if (Array.isArray(value)) return value.map(formatValue).join(", ");
        if (typeof value === "object") {
          var rows = Object.entries(value).map(function(e) {
            return "<tr><td class='col-name'>" + esc(e[0]) + "</td><td class='col-value'>" + formatValue(e[1]) + "</td></tr>";
          }).join("");
          return "<table class='stat-table'>" + rows + "</table>";
        }
        return esc(String(value));
      }

      // ── Renderers ─────────────────────────────────────────────────────────────

      function renderTools(toolCalls) {
        var container = document.getElementById("tool-list");
        if (!toolCalls.length) {
          container.innerHTML = "<p style='color:#64748b;font-size:0.85rem;'>No tools called.</p>";
          return;
        }
        container.innerHTML = toolCalls.map(function(tc) {
          return "<div class='tool-card'>"
            + "<div class='tool-name'>✓ " + esc(tc.tool || "unknown") + "</div>"
            + "<div style='font-size:0.75rem;color:#94a3b8;font-family:monospace;white-space:pre-wrap;'>"
            + esc(JSON.stringify(tc.args || {}, null, 2))
            + "</div></div>";
        }).join("");
      }

      function renderResult(data) {
        var container = document.getElementById("result-list");
        var html = "";

        // 1. Thinking
        if (data.thinking) {
          html += "<div class='thinking-card'>"
            + "<strong style='color:var(--text-main);'>🧠 Thinking</strong><br/>"
            + esc(data.thinking)
            + "</div>";
        }

        // 2. Summary
        if (data.summary) {
          html += "<div class='summary-banner'>💬 " + esc(data.summary) + "</div>";
        }

        // 3. Interpretation + Statistics
        var hasInterp = data.interpretation && data.interpretation.trim();
        var hasStats  = data.statistics && Object.keys(data.statistics).length > 0;

        if (hasInterp || hasStats) {
          html += "<div class='result-card'>";

          if (hasInterp) {
            html += "<div class='section-label'>Interpretation</div>"
              + "<div style='font-size:0.9rem;line-height:1.6;margin-bottom:14px;color:var(--text-main);'>"
              + esc(data.interpretation)
              + "</div>";
          }

          if (hasStats) {
            var rows = Object.entries(data.statistics).map(function(e) {
              return "<tr><td class='col-name'>" + esc(e[0]) + "</td><td class='col-value'>" + formatValue(e[1]) + "</td></tr>";
            }).join("");
            html += "<div class='section-label'>Statistics</div>"
              + "<table class='stat-table'><tbody>" + rows + "</tbody></table>";
          }

          html += "</div>";
        }

        // 4. Insight
        if (data.insight && data.insight.trim()) {
          html += "<div class='insight-card'>💡 <strong>Insight:</strong> " + esc(data.insight) + "</div>";
        }

        // 5. Error Guidance
        if (data.error_guidance) {
          html += "<div class='error-card'>⚠️ <strong>Correction:</strong> " + esc(data.error_guidance) + "</div>";
        }

        // Fallback
        if (!html.trim()) {
          html = "<div class='result-card'><div class='section-label'>Raw Response</div>"
            + "<pre style='font-size:0.75rem;color:var(--text-muted);white-space:pre-wrap;'>"
            + esc(JSON.stringify(data, null, 2))
            + "</pre></div>";
        }

        container.innerHTML = html;
      }
    </script>
  </body>
</html>
